site_name: benchmarkoor-fetch
site_description: Fetch EVM benchmark suites from the Benchmarkoor API and produce clean tabular outputs.
site_url: https://misilva73.github.io/benchmarkoor-fetch/
repo_url: https://github.com/misilva73/benchmarkoor-fetch
repo_name: misilva73/benchmarkoor-fetch
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true
            show_root_heading: true
            show_root_full_path: false
            heading_level: 2

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - API reference:
      - BenchmarkoorClient: api/client.md
      - FetchConfig: api/config.md
      - FetchResult: api/result.md
      - parse_test_titles: api/parse.md
  - Changelog: changelog.md
